# 部署（deploy）与生产栈：仅 main 分支 push 触发。
# PR 校验（ci-check）：仅当 PR 的目标分支为 main 时触发（合并进 main 前的检查）。
# 其他分支的 push / 指向非 main 的 PR 均不会运行本工作流。
name: Docker Compose CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci-check:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    env:
      GIT_HTTP_VERSION: HTTP/1.1
      BACKEND_HOST_PORT: 2604
      FRONTEND_HOST_PORT: 2605
      CLIENT_HOST_PORT: 2606
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
      CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
      CARTERSIA_API_KEY: ${{ secrets.CARTERSIA_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
      HUME_API_SECRET: ${{ secrets.HUME_API_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Configure git transport
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          submodules: false

      - name: Check required secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is empty. Please set repository secret DATABASE_URL."
            exit 1
          fi

      - name: Cleanup previous stack
        run: docker compose -f docker-compose.yml down --remove-orphans -v || true

      - name: Build images
        run: docker compose -f docker-compose.yml build backend backend-migrate frontend client

      - name: Run backend migrations/seed
        run: docker compose -f docker-compose.yml run --rm backend-migrate

      - name: Start backend and frontends for smoke check
        run: docker compose -f docker-compose.yml up -d backend frontend client

      - name: Show container status
        run: docker compose -f docker-compose.yml ps

      - name: Cleanup after PR check
        if: always()
        run: docker compose -f docker-compose.yml down --remove-orphans -v || true

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    env:
      GIT_HTTP_VERSION: HTTP/1.1
      BACKEND_HOST_PORT: 2604
      FRONTEND_HOST_PORT: 2605
      CLIENT_HOST_PORT: 2606
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
      CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
      CARTERSIA_API_KEY: ${{ secrets.CARTERSIA_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
      HUME_API_SECRET: ${{ secrets.HUME_API_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Configure git transport
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          submodules: false

      - name: Build images
        run: docker compose -f docker-compose.yml build backend backend-migrate frontend client

      - name: Check required secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is empty. Please set repository secret DATABASE_URL."
            exit 1
          fi

      - name: Run backend migrations/seed
        run: docker compose -f docker-compose.yml run --rm backend-migrate

      - name: Start backend and frontends (keep running)
        run: docker compose -f docker-compose.yml up -d backend frontend client

      - name: Show container status
        run: docker compose -f docker-compose.yml ps
