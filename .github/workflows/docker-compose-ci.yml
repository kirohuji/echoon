# 仅 main 分支 push：build + 迁移 + 拉起 Docker Compose 栈。
#
# 远程浏览器访问管理端登录失败（CORS / Network Error / OPTIONS 204）时，请在仓库 Secrets 或 self-hosted 的 .env 中配置：
#   FRONTEND_ORIGINS = 管理后台的完整 Origin，如 http://115.159.95.166:2605
#   BETTER_AUTH_URL   = 后端公网根地址，如 http://115.159.95.166:2604
#   BETTER_AUTH_SECRET = 生产随机密钥（≥32 字符）
#   VITE_SERVER_URL   = 与浏览器访问 API 一致，如 http://115.159.95.166:2604（勿写容器内 backend:3000）
name: Docker Compose CI

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    env:
      GIT_HTTP_VERSION: HTTP/1.1
      BACKEND_HOST_PORT: 2604
      FRONTEND_HOST_PORT: 2605
      CLIENT_HOST_PORT: 2606
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
      VITE_AUTH_BASE_URL: ${{ secrets.VITE_AUTH_BASE_URL }}
      FRONTEND_ORIGINS: ${{ secrets.FRONTEND_ORIGINS }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
      CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
      CARTERSIA_API_KEY: ${{ secrets.CARTERSIA_API_KEY }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
      HUME_API_KEY: ${{ secrets.HUME_API_KEY }}
      HUME_API_SECRET: ${{ secrets.HUME_API_SECRET }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      # Whisper-server：仅当服务可用且该 URL 非空时，后端才会做词级时间戳补全
      WHISPER_INFERENCE_URL: ${{ secrets.WHISPER_INFERENCE_URL }}
      WHISPER_LANGUAGE: ${{ secrets.WHISPER_LANGUAGE || 'en' }}
      WHISPER_TIMEOUT_MS: ${{ secrets.WHISPER_TIMEOUT_MS || '600000' }}
      WHISPER_SPLIT_ON_WORD: ${{ secrets.WHISPER_SPLIT_ON_WORD || 'true' }}
    steps:
      - name: Configure git transport
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
      # 必须把当前 commit 拉到工作目录，docker compose / Dockerfile 才能读到源码；不可删。
      # 使用浅克隆（默认 depth=1），避免 fetch-depth:0 拉全历史导致很慢。
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          lfs: false
          submodules: false

      - name: CORS / 登录相关变量提示
        run: |
          if [ -z "${FRONTEND_ORIGINS:-}" ]; then
            echo "::warning::FRONTEND_ORIGINS 未设置。公网访问管理端时请在仓库 Secrets 中设置，例如 http://你的IP:2605，否则浏览器会报 CORS / Network Error。"
          fi
          if [ -z "${VITE_SERVER_URL:-}" ]; then
            echo "::warning::VITE_SERVER_URL 未设置。构建出的前端会默认指向容器内 backend:3000，浏览器无法访问。请设为公网 API 地址，例如 http://你的IP:2604"
          fi

      - name: Build images
        run: docker compose -f docker-compose.yml build backend backend-migrate frontend client

      - name: Check required secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is empty. Please set repository secret DATABASE_URL."
            exit 1
          fi

      - name: Run backend migrations/seed
        run: docker compose -f docker-compose.yml run --rm backend-migrate

      - name: Start backend and frontends (keep running)
        run: docker compose -f docker-compose.yml up -d backend frontend client

      - name: Show container status
        run: docker compose -f docker-compose.yml ps
