name: Docker Compose CI

on:
  push:
  pull_request:

jobs:
  compose-build-and-run:
    runs-on: self-hosted
    env:
      # 启用 docker-compose.yml 里的 postgres（profile docker-infra）
      COMPOSE_PROFILES: docker-infra
      GIT_HTTP_VERSION: HTTP/1.1
      POSTGRES_HOST_PORT: 15432
      BACKEND_HOST_PORT: 2604
      FRONTEND_HOST_PORT: 2605
      CLIENT_HOST_PORT: 2606
      DATABASE_URL: postgresql://echoon:echoon@postgres:5432/echoon?schema=public
    steps:
      - name: Configure git transport
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          submodules: false

      - name: Cleanup previous stack
        run: docker compose -f docker-compose.yml down --remove-orphans -v || true

      - name: Build images
        run: docker compose -f docker-compose.yml build backend backend-migrate frontend client

      - name: Start Postgres
        run: docker compose -f docker-compose.yml up -d postgres

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml exec -T postgres pg_isready -U echoon -d echoon; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "waiting... ($i)"
            sleep 2
          done
          echo "Postgres failed to become ready"
          exit 1

      - name: Run backend migrations/seed
        run: docker compose -f docker-compose.yml run --rm backend-migrate

      - name: Start backend and frontends
        run: docker compose -f docker-compose.yml up -d backend frontend client

      - name: Show container status
        run: docker compose -f docker-compose.yml ps

      - name: Cleanup after job
        if: always()
        run: docker compose -f docker-compose.yml down --remove-orphans -v || true
