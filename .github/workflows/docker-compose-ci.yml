name: Docker Compose CI

on:
  push:
  pull_request:

jobs:
  compose-build-and-run:
    runs-on: self-hosted
    env:
      GIT_HTTP_VERSION: HTTP/1.1
      POSTGRES_HOST_PORT: 15432
      BACKEND_HOST_PORT: 2604
      FRONTEND_HOST_PORT: 2605
      CLIENT_HOST_PORT: 2606
      DATABASE_URL: postgresql://echoon:echoon@postgres:5432/echoon?schema=public
      ENABLE_RMQ: "true"
      RMQ_URL: amqp://guest:guest@rabbitmq:5672
    steps:
      - name: Configure git transport
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000
          git config --global core.compression 0
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          submodules: false

      - name: Cleanup previous stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --remove-orphans -v || true

      - name: Build images
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build backend backend-migrate frontend client

      - name: Start dependencies
        run: docker compose --profile docker-infra -f docker-compose.yml -f docker-compose.ci.yml up -d postgres rabbitmq

      - name: Run backend migrations/seed
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml run --rm backend-migrate

      - name: Start backend
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d backend

      - name: Start frontend/client
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d frontend client

      - name: Show backend container status
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml ps

      - name: Cleanup after job
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down --remove-orphans -v || true

