# 默认：使用「外部」PostgreSQL / Redis（通过 .env 里的 DATABASE_URL、REDIS_URL）。
# 本地 docker 里的 postgres / rabbitmq 仅作备用：启动时加 --profile docker-infra
#
# 在外部 Postgres 上新建库（示例，在 psql 里执行）:
#   CREATE DATABASE echoon OWNER lourd;
#   GRANT ALL PRIVILEGES ON DATABASE echoon TO lourd;

services:
  # 可选：仅当需要本地容器数据库时使用
  postgres:
    profiles: [docker-infra]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: echoon
      POSTGRES_USER: echoon
      POSTGRES_PASSWORD: echoon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoon -d echoon"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 可选：仅当需要本地 RabbitMQ 时使用
  rabbitmq:
    profiles: [docker-infra]
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend-migrate:
    image: echoon-backend:local
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env (external Postgres URL)}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      ENABLE_RMQ: ${ENABLE_RMQ:-false}
      RMQ_URL: ${RMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RMQ_QUEUE: ${RMQ_QUEUE:-pipecat}
      RMQ_ROUTING_KEY: ${RMQ_ROUTING_KEY:-pipecat}
      REDIS_URL: ${REDIS_URL:-}
    command:
      - sh
      - -c
      - >-
        pnpm --filter echoon-backend prisma:generate
        && pnpm --filter echoon-backend prisma:push -- --accept-data-loss
        && pnpm --filter echoon-backend prisma:seed
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
    image: echoon-backend:local
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      ENABLE_RMQ: ${ENABLE_RMQ:-false}
      RMQ_URL: ${RMQ_URL:-}
      RMQ_QUEUE: ${RMQ_QUEUE:-pipecat}
      RMQ_ROUTING_KEY: ${RMQ_ROUTING_KEY:-pipecat}
      REDIS_URL: ${REDIS_URL:-}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-2604}:3000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://backend:3000}
        VITE_ASSET_URL: ${VITE_ASSET_URL:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-}
        VITE_PIPETCAT_URL: ${VITE_PIPETCAT_URL:-}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-2605}:80"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://backend:3000}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${CLIENT_HOST_PORT:-2606}:80"

volumes:
  postgres_data:
