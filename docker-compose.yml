# 默认：业务数据走「外部」PostgreSQL —— 在 .env 里配置 DATABASE_URL 指向你的服务器即可。
#       Compose 里的 postgres 服务仅在 profile docker-infra 下启用（本地/CI 备用），平时不用起。
#
# Redis：.env 里可配 REDIS_URL（你服务器上的 Redis:6379）；当前后端代码若尚未接入 Bull/缓存，该变量仅为预留。
#
# 在外部 Postgres 上新建库（示例，在 psql 里执行）:
#   CREATE DATABASE echoon OWNER lourd;
#   GRANT ALL PRIVILEGES ON DATABASE echoon TO lourd;

services:
  # 可选：仅当需要本地容器数据库时使用（CI 会启用 profile docker-infra）
  postgres:
    profiles: [docker-infra]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: echoon
      POSTGRES_USER: echoon
      POSTGRES_PASSWORD: echoon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echoon -d echoon"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend-migrate:
    image: echoon-backend:local
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env (external Postgres URL)}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      REDIS_URL: ${REDIS_URL:-}
      # TTS providers (optional for CI smoke check, but needed for runtime audio generation)
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      CARTERSIA_API_KEY: ${CARTERSIA_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      HUME_API_KEY: ${HUME_API_KEY:-}
      HUME_API_SECRET: ${HUME_API_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    command:
      - sh
      - -c
      - >-
        pnpm --filter echoon-backend prisma:generate
        && pnpm --filter echoon-backend prisma:push -- --accept-data-loss
        && pnpm --filter echoon-backend prisma:seed
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
    image: echoon-backend:local
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      # 浏览器访问「管理前端」的完整 Origin，逗号分隔。生产环境必填，否则 CORS 默认只允许 localhost:5173，远程登录会失败。
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      # better-auth：对外暴露的后端根地址（与浏览器里访问 API 的协议+主机+端口一致，不要带 /api）
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-better-auth-secret-min-32-chars-long-key}
      REDIS_URL: ${REDIS_URL:-}
      # TTS providers (used by /document-library audio generation)
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      CARTERSIA_API_KEY: ${CARTERSIA_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      HUME_API_KEY: ${HUME_API_KEY:-}
      HUME_API_SECRET: ${HUME_API_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-2604}:3000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
        # 构建进静态资源的 API 根路径：须与浏览器可访问地址一致。无全局 /api/v1 前缀时请填「http://公网IP:2604」；若后端挂了 /api/v1 则填带此前缀的 URL。
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://backend:3000}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-}
        VITE_ASSET_URL: ${VITE_ASSET_URL:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-}
        VITE_PIPETCAT_URL: ${VITE_PIPETCAT_URL:-}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-2605}:80"

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        PNPM_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_SERVER_URL: ${VITE_SERVER_URL:-http://backend:3000}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${CLIENT_HOST_PORT:-2606}:80"

volumes:
  postgres_data:
