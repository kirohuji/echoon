server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Static assets must never fallback to index.html.
  # If an asset is missing, return 404 to avoid MIME mismatch (text/html for css/js).
  location ~* ^/assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Compatibility: some builds/environments may request /main/assets/*
  # while files are physically under /assets/*.
  location ~* ^/main/assets/(.*)$ {
    rewrite ^/main/assets/(.*)$ /assets/$1 break;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Compatibility: if HTML referenced relative assets, browser may request
  # /auth/jwt/assets/*, /main/*/assets/*, etc. Rewrite all nested assets to /assets/*.
  location ~* ^/.+/assets/(.*)$ {
    rewrite ^/.+/assets/(.*)$ /assets/$1 break;
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # HTML entry should not be strongly cached, so refresh gets latest hashed asset map.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

