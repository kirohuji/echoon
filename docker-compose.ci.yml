# CI：启用 profile docker-infra 时才有本地 postgres；需设置 COMPOSE_PROFILES=docker-infra（见 GitHub Actions）。

services:
  backend-migrate:
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      backend-migrate:
        condition: service_completed_successfully

  postgres: {}
  frontend: {}
  client: {}
